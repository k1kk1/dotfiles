# ==============================================================================
# Basic
# ==============================================================================

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Ghosttyのタイトルへ「セッション · ウィンドウ · ディレクトリ」を表示する
set -g set-titles on
set -g set-titles-string "#S · #I:#W · #{b:pane_current_path}"

# Escapeの遅延を短くする
set -s escape-time 10

# ==============================================================================
# Window / pane navigation
# ==============================================================================

# Shift + Left / Right でウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt + hjkl でペイン移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペイン分割
# 標準の % / " は無効化し、覚えやすい | / - に統一する
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# ==============================================================================
# Safety
# ==============================================================================

# 複数ペイン同時入力はデフォルトOFF
setw -g synchronize-panes off

# 明示的にトグルしたい場合だけ使う
bind-key S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# 監視ペイン停止用の明示キー
# Prefix + X で現在ペインを kill
bind-key X kill-pane

# Prefix + Shift-X で現在ウィンドウを kill
bind-key C-X kill-window

# ==============================================================================
# Pane border / status
# ==============================================================================

set -g pane-border-status top
# ペインタイトルは通常時を控えめにし、選択中だけ水色で強調する。
set -g pane-border-format "#{?pane_active,#[fg=#59d8ff]#[bg=#59d8ff],#[fg=#9c7f68]#[bg=#9c7f68]}#[fg=#17130f,bold] #{pane_title} #{?pane_active,#[bg=default]#[fg=#59d8ff],#[bg=default]#[fg=#9c7f68]}#[default]"
set -g pane-border-lines heavy

set -g pane-border-style "fg=#4b4037"
set -g pane-active-border-style "fg=#59d8ff"

set -g status on
# 現在日時はペインタイトルではなく、ステータス右側で更新する。
set -g status-interval 1
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#17130f,fg=#9c7f68"

# セッション名を左端のアクセントとして表示する。
set -g status-left "#[bg=#ff8000,fg=#17130f,bold] 󰆍 #S #[bg=#17130f,fg=#ff8000] "

# アラート検知時はKKS/SSKと検知時刻を表示し、通常時は日時だけを表示する。
set -g status-right "#{?@k8s_alert,#[fg=#ff8000]#[bold]⚠ #{@k8s_alert}  ,}#[fg=#9c7f68]#[nobold]%Y-%m-%d  %H:%M:%S "

setw -g window-status-separator " "
# 角丸の内側を10文字幅に揃え、ウィンドウ名を中央へ配置する。
setw -g window-status-format "#[bg=#17130f,fg=#2a241f]#[bg=#2a241f,fg=#9c7f68,width=10,align=centre]#{=8:#{window_index}:#{window_name}}#[bg=#17130f,fg=#2a241f,width=0,noalign]"
setw -g window-status-current-format "#[bg=#17130f,fg=#ff8000]#[bg=#ff8000,fg=#17130f,bold,width=10,align=centre]#{=8:#{window_index}:#{window_name}}#[bg=#17130f,fg=#ff8000,width=0,noalign]"

# ==============================================================================
# Copy mode
# ==============================================================================

setw -g mode-keys vi
setw -g mode-style "bg=#59d8ff,fg=#17130f"

# ホイール上方向でcopy modeに入り、ペインの履歴をスクロールする。
# アプリケーションへ上下キー（^[[A / ^[[B）として送らない。
bind-key -T root WheelUpPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" "copy-mode -e"
bind-key -T root WheelDownPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" ""

# OS別のクリップボードコマンドを自動判定
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -g @clipboard_cmd 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -g @clipboard_cmd 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -g @clipboard_cmd 'xclip -selection clipboard'
    } {
      if-shell 'command -v clip.exe >/dev/null 2>&1' {
        set -g @clipboard_cmd 'clip.exe'
      } {
        set -g @clipboard_cmd 'cat >/dev/null'
      }
    }
  }
}

# マウス選択後、指を離したタイミングでコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"

# vi風コピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"
