# ==============================================================================
# Basic
# ==============================================================================

# ==============================================================================
# Color palette
# ==============================================================================

# ベースカラー: 画面全体の黒〜グレー
set -g @color_bg_base "#0b0b0b"
set -g @color_bg_tab_inactive "#161616"
set -g @color_bg_tab_active "#464646"
set -g @color_bg_pane_title_active "#5a5a5a"
set -g @color_bg_pane_title_inactive "#292929"
set -g @color_border_inactive "#333333"
set -g @color_border_active "#5a5a5a"

# テキストカラー: 通常文字、弱め文字、強調文字
set -g @color_fg_primary "#d0d0d0"
set -g @color_fg_muted "#8a8a8a"
set -g @color_fg_status "#7a7a7a"
set -g @color_fg_dark "#17130f"

# アラートカラー: 通知アイコンと警告テキスト
set -g @color_alert_active "#e18d3f"
set -g @color_alert_inactive "#995d22"

# アクセントカラー: 選択やメニューの強調
set -g @color_accent_blue "#4fa7c2"

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Ghosttyのタイトルへ「セッション · ウィンドウ · ディレクトリ」を表示する
set -g set-titles on
set -g set-titles-string "#S · #I:#W · #{b:pane_current_path}"

# Escapeの遅延を短くする
set -s escape-time 10

# ==============================================================================
# Window / pane navigation
# ==============================================================================

# Shift + Left / Right でウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt + hjkl でペイン移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペイン分割
# 標準の % / " は無効化し、覚えやすい | / - に統一する
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# ==============================================================================
# Safety
# ==============================================================================

# 複数ペイン同時入力はデフォルトOFF
setw -g synchronize-panes off

# 明示的にトグルしたい場合だけ使う
bind-key S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# 監視ペイン停止用の明示キー
# Prefix + X で現在ペインを kill
bind-key X kill-pane

# Prefix + R で終了済みペインを最後のコマンドから復活
bind-key R respawn-pane -k

# Prefix + Shift-X で現在ウィンドウを kill
bind-key C-X kill-window

# ==============================================================================
# Pane border / status
# ==============================================================================

set -g pane-border-status top
# モノトーンに合わせて、ペインタイトルは角張ったラベルで表示する。
set -g pane-border-format " #{?pane_active,#[bg=#{@color_bg_pane_title_active}]#[fg=#{@color_fg_primary}],#[bg=#{@color_bg_pane_title_inactive}]#[fg=#{@color_fg_muted}]}#[bold] #{pane_title} #[default]"
# ペイン境界を見分けやすい太線で表示する。
set -g pane-border-lines heavy
# 2ペイン時に境界線の半分だけ色を変えるインジケーターを使わない。
set -g pane-border-indicators off

set -gF pane-border-style "fg=#{@color_border_inactive}"
set -gF pane-active-border-style "fg=#{@color_border_active}"

set -g status on
# 現在日時はペインタイトルではなく、ステータス右側で更新する。
set -g status-interval 1
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80
set -gF status-style "bg=#{@color_bg_base},fg=#{@color_fg_status}"

# セッション名は左端だけ以前のセグメント表示に戻す。
set -g status-left "#[bg=#{@color_bg_pane_title_active}]#[fg=#{@color_fg_primary}]#[bold] 󰆍 #S #[bg=#{@color_bg_base}]#[fg=#{@color_bg_pane_title_active}] "

# アラート検知時は右下にオレンジ系で KKS/SSK と検知時刻を表示する。
set -g status-right "#{?@k8s_alert,#{?#{==:#{window_id},#{@k8s_alert_window}},#[fg=#{@color_alert_active}]#[bold],#[fg=#{@color_alert_inactive}]#[bold]}󰂚 #{@k8s_alert} #[default]  ,}#[fg=#{@color_fg_status}]#[nobold]%Y-%m-%d  %H:%M:%S "

# 右クリックメニューは通常文字を明るめの白にし、選択中だけ水色で強調する。
set -gF popup-style "bg=#{@color_bg_base},fg=#{@color_fg_primary}"
set -gF popup-border-style "bg=#{@color_bg_base},fg=#{@color_border_active}"
set -gF menu-style "bg=#{@color_bg_base},fg=#{@color_fg_primary}"
set -gF menu-selected-style "bg=#{@color_accent_blue},fg=#{@color_fg_dark},bold"

setw -g window-status-separator " "
setw -gF window-status-bell-style "bg=#{@color_bg_tab_inactive},fg=#{@color_fg_muted}"
setw -gF window-status-activity-style "bg=#{@color_bg_tab_inactive},fg=#{@color_fg_muted}"
# タブは 3 状態だけに絞る:
# inactive = muted on inactive bg
# inactive alert = alert_inactive on inactive bg
# active alert = alert_active on active bg
setw -g window-status-format "#{?@k8s_window_alert,#[bg=#{@color_bg_tab_inactive}]#[fg=#{@color_alert_inactive}] 󰂚 #{=10:#{window_index}:#{window_name}} ,#[bg=#{@color_bg_tab_inactive}]#[fg=#{@color_fg_muted}] #{=11:#{window_index}:#{window_name}} }#[default]"
setw -g window-status-current-format "#{?@k8s_window_alert,#[bg=#{@color_bg_tab_active}]#[fg=#{@color_alert_active}]#[bold] 󰂚 #{=10:#{window_index}:#{window_name}} ,#[bg=#{@color_bg_tab_active}]#[fg=#{@color_fg_primary}]#[bold] #{=11:#{window_index}:#{window_name}} }#[default]"

# ==============================================================================
# Copy mode
# ==============================================================================

setw -g mode-keys vi
setw -g mode-style "bg=#{@color_accent_blue},fg=#{@color_fg_dark}"

# ホイール上方向でcopy modeに入り、ペインの履歴をスクロールする。
# アプリケーションへ上下キー（^[[A / ^[[B）として送らない。
bind-key -T root WheelUpPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" "copy-mode -e"
bind-key -T root WheelDownPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" ""

# OS別のクリップボードコマンドを自動判定
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -g @clipboard_cmd 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -g @clipboard_cmd 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -g @clipboard_cmd 'xclip -selection clipboard'
    } {
      if-shell 'command -v clip.exe >/dev/null 2>&1' {
        set -g @clipboard_cmd 'clip.exe'
      } {
        set -g @clipboard_cmd 'cat >/dev/null'
      }
    }
  }
}

# マウス選択後、指を離したタイミングでコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"

# vi風コピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"
