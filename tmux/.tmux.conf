# ==============================================================================
# Basic
# ==============================================================================

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Ghosttyのタイトルへ「セッション · ウィンドウ · ディレクトリ」を表示する
set -g set-titles on
set -g set-titles-string "#S · #I:#W · #{b:pane_current_path}"

# Escapeの遅延を短くする
set -s escape-time 10

# ==============================================================================
# Window / pane navigation
# ==============================================================================

# Shift + Left / Right でウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt + hjkl でペイン移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペイン分割
# 標準の % / " は無効化し、覚えやすい | / - に統一する
unbind %
unbind '"'
bind | split-window -h
bind - split-window -v

# ==============================================================================
# Safety
# ==============================================================================

# 複数ペイン同時入力はデフォルトOFF
setw -g synchronize-panes off

# 明示的にトグルしたい場合だけ使う
bind-key S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# 監視ペイン停止用の明示キー
# Prefix + X で現在ペインを kill
bind-key X kill-pane

# Prefix + Shift-X で現在ウィンドウを kill
bind-key C-X kill-window

# ==============================================================================
# Pane border / status
# ==============================================================================

set -g pane-border-status top
# モノトーンに合わせて、ペインタイトルは角張ったラベルで表示する。
set -g pane-border-format " #{?pane_active,#[bg=#5a5a5a]#[fg=#f0f0f0],#[bg=#292929]#[fg=#8a8a8a]}#[bold] #{pane_title} #[default]"
# ペイン境界を見分けやすい太線で表示する。
set -g pane-border-lines heavy
# 2ペイン時に境界線の半分だけ色を変えるインジケーターを使わない。
set -g pane-border-indicators off

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#5a5a5a"

set -g status on
# 現在日時はペインタイトルではなく、ステータス右側で更新する。
set -g status-interval 1
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80
set -g status-style "bg=#0b0b0b,fg=#7a7a7a"

# セッション名は左端だけ以前のセグメント表示に戻す。
set -g status-left "#[bg=#5a5a5a,fg=#f0f0f0,bold] 󰆍 #S #[bg=#0b0b0b,fg=#5a5a5a] "

# アラート検知時はKKS/SSKと検知時刻を表示し、通常時は日時だけを表示する。
set -g status-right "#{?@k8s_alert,#[fg=#b0b0b0]#[bold]⚠ #{@k8s_alert}  ,}#[fg=#7a7a7a]#[nobold]%Y-%m-%d  %H:%M:%S "

# 右クリックメニューは通常文字を明るめの白にし、選択中だけ水色で強調する。
set -g popup-style "bg=#0b0b0b,fg=#f0f0f0"
set -g popup-border-style "bg=#0b0b0b,fg=#5a5a5a"
set -g menu-style "bg=#0b0b0b,fg=#f0f0f0"
set -g menu-selected-style "bg=#4fa7c2,fg=#17130f,bold"

setw -g window-status-separator " "
# タブは角丸を使わず、固定幅の直線的なラベルで中央配置する。
setw -g window-status-format "#[bg=#292929,fg=#7a7a7a,width=12,align=centre] #{=9:#{window_index}:#{window_name}} #[default]"
setw -g window-status-current-format "#[bg=#5a5a5a,fg=#f0f0f0,bold,width=12,align=centre] #{=9:#{window_index}:#{window_name}} #[default]"

# ==============================================================================
# Copy mode
# ==============================================================================

setw -g mode-keys vi
setw -g mode-style "bg=#4fa7c2,fg=#17130f"

# ホイール上方向でcopy modeに入り、ペインの履歴をスクロールする。
# アプリケーションへ上下キー（^[[A / ^[[B）として送らない。
bind-key -T root WheelUpPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" "copy-mode -e"
bind-key -T root WheelDownPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" ""

# OS別のクリップボードコマンドを自動判定
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -g @clipboard_cmd 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -g @clipboard_cmd 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -g @clipboard_cmd 'xclip -selection clipboard'
    } {
      if-shell 'command -v clip.exe >/dev/null 2>&1' {
        set -g @clipboard_cmd 'clip.exe'
      } {
        set -g @clipboard_cmd 'cat >/dev/null'
      }
    }
  }
}

# マウス選択後、指を離したタイミングでコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"

# vi風コピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"
