"$schema" = 'https://starship.rs/config-schema.json'

# ==============================================================================
# Layout
# ==============================================================================
#
# Left:   directory  git_branch git_status
#         вқҜ
# Right:  status  cmd_duration  jobs  python  conda  nodejs  kubernetes  terraform  aws  direnv
#
# p10k classic/disconnected гӮ№гӮҝгӮӨгғ«гҒ«еҗҲгӮҸгҒӣгӮӢпјҲгғ‘гғҜгғјгғ©гӮӨгғізҹўеҚ°гҒӘгҒ—пјү

format = """
$directory$git_branch$git_status$line_break$character"""

right_format = """
$status\
$cmd_duration\
$jobs\
$python\
$conda\
$nodejs\
$kubernetes"""

add_newline = false

# ==============================================================================
# Left prompt
# ==============================================================================

[directory]
style = "white"
truncation_length = 5
truncation_symbol = "вҖҰ/"
home_symbol = "~"
read_only = " у°Ңҫ"
read_only_style = "red"

[git_branch]
symbol = "п„Ұ "
format = "  [$symbol$branch]($style)"
style = "bright-red"
truncation_length = 40
truncation_symbol = "вҖҰ"
always_show_remote = false

[git_status]
format = '( [$all_status$ahead_behind]($style)) '
style = "yellow"
conflicted = "~${count}"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = '$${count}'
modified = "*${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "вңҳ${count}"

[character]
success_symbol = "[вқҜ](white)"
error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](white)"

# ==============================================================================
# Right prompt
# ==============================================================================

# Exit status вҖ” p10k: STATUS_OK=false, error fg=160
[status]
disabled = false
format = "[вңҳ $status]($style) "
style = "bold color(160)"
recognize_signal_code = true
map_symbol = false

# Duration вҖ” p10k: threshold=3s, fg=248
[cmd_duration]
min_time = 3_000
format = "[$duration]($style) "
style = "color(248)"
show_milliseconds = false

# Background jobs вҖ” p10k: fg=37
[jobs]
symbol = "пҖ“ "
format = "[$symbol$number]($style) "
number_threshold = 1
symbol_threshold = 1
style = "color(37)"

# Python: venv / pyenv / conda вҖ” p10k: virtualenv/pyenv fg=37
[python]
symbol = "оҲө "
format = '[$symbol${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "color(37)"
pyenv_version_name = true
pyenv_prefix = ""
detect_files = [".python-version", "requirements.txt", "pyproject.toml", "setup.py", "Pipfile"]
detect_folders = [".venv", "venv"]
detect_extensions = ["py"]
version_format = "v${raw}"

[conda]
symbol = "п„Ң "
format = "[$symbol$environment]($style) "
style = "color(37)"
ignore_base = true
truncation_length = 20

# Node.js вҖ” package.json гҒҢгҒӮгӮӢгҒЁгҒҚгҒ®гҒҝ / fg=244
[nodejs]
symbol = "оңҳ "
format = "[$symbol$version]($style) "
style = "color(244)"
detect_files = ["package.json"]
detect_folders = ["node_modules"]
detect_extensions = []

# Kubernetes вҖ” p10k: KUBECONTEXT_DEFAULT fg=134, prod=red
[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "уұғҫ "
style = "color(134)"
contexts = [
  { context_pattern = ".*prod.*", style = "bold red", symbol = "вӣ” " },
  { context_pattern = ".*production.*", style = "bold red", symbol = "вӣ” " },
  { context_pattern = ".*stg.*", style = "yellow", symbol = "уұғҫ " },
  { context_pattern = ".*staging.*", style = "yellow", symbol = "уұғҫ " },
]

# ==============================================================================
# Disabled modules
# ==============================================================================

[terraform]
disabled = true

[aws]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
