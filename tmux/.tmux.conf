# ==============================================================================
# Basic
# ==============================================================================

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Escapeの遅延を短くする
set -s escape-time 10

# ==============================================================================
# Window / pane navigation
# ==============================================================================

# Shift + Left / Right でウィンドウ移動
bind -n S-Left previous-window
bind -n S-Right next-window

# Alt + hjkl でペイン移動
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ペイン分割
bind | split-window -h
bind - split-window -v

# ==============================================================================
# Safety
# ==============================================================================

# 複数ペイン同時入力はデフォルトOFF
setw -g synchronize-panes off

# 明示的にトグルしたい場合だけ使う
bind-key S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# 監視ペイン停止用の明示キー
# Prefix + X で現在ペインを kill
bind-key X kill-pane

# Prefix + Shift-X で現在ウィンドウを kill
bind-key C-X kill-window

# ==============================================================================
# Pane border / status
# ==============================================================================

set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[bold] #S "
set -g status-right "%Y-%m-%d %H:%M "

setw -g window-status-current-style bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ==============================================================================
# Copy mode
# ==============================================================================

setw -g mode-keys vi

# ホイール上方向でcopy modeに入り、ペインの履歴をスクロールする。
# アプリケーションへ上下キー（^[[A / ^[[B）として送らない。
bind-key -T root WheelUpPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" "copy-mode -e"
bind-key -T root WheelDownPane select-pane -t = \; if-shell -F "#{pane_in_mode}" \
  "send-keys -M" ""

# OS別のクリップボードコマンドを自動判定
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  set -g @clipboard_cmd 'pbcopy'
} {
  if-shell 'command -v wl-copy >/dev/null 2>&1' {
    set -g @clipboard_cmd 'wl-copy'
  } {
    if-shell 'command -v xclip >/dev/null 2>&1' {
      set -g @clipboard_cmd 'xclip -selection clipboard'
    } {
      if-shell 'command -v clip.exe >/dev/null 2>&1' {
        set -g @clipboard_cmd 'clip.exe'
      } {
        set -g @clipboard_cmd 'cat >/dev/null'
      }
    }
  }
}

# マウス選択後、指を離したタイミングでコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"

# vi風コピー
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@clipboard_cmd}"
